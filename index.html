<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClutchByte AI</title>

<style>
:root{
--bg:#0f172a;
--panel:#111827;
--border:#1f2937;
--text:#f3f4f6;
--accent:#2563eb;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}

body{
background:var(--bg);
color:var(--text);
height:100vh;
display:flex;
overflow:hidden;
}

/* Sidebar */
.sidebar{
width:240px;
background:#0b1220;
border-right:1px solid var(--border);
display:flex;
flex-direction:column;
padding:12px;
transition:.3s;
}

.sidebar.hidden{
transform:translateX(-100%);
position:absolute;
z-index:20;
height:100%;
}

.menu-btn{
display:none;
position:absolute;
top:10px;
left:10px;
background:var(--accent);
border:none;
padding:6px 10px;
border-radius:6px;
color:white;
z-index:30;
}

/* Chat */
.main{
flex:1;
display:flex;
flex-direction:column;
height:100%;
}

.header{
padding:12px;
border-bottom:1px solid var(--border);
text-align:center;
font-weight:bold;
}

.messages{
flex:1;
overflow:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.message{
max-width:85%;
padding:10px;
border-radius:8px;
font-size:14px;
white-space:pre-wrap;
}

.user{
align-self:flex-end;
background:var(--accent);
}

.ai{
align-self:flex-start;
background:var(--panel);
border:1px solid var(--border);
}

.input-area{
display:flex;
padding:10px;
border-top:1px solid var(--border);
background:var(--bg);
}

textarea{
flex:1;
resize:none;
padding:8px;
border-radius:6px;
border:1px solid var(--border);
background:var(--panel);
color:white;
}

.send{
background:var(--accent);
border:none;
padding:8px 14px;
margin-left:8px;
border-radius:6px;
color:white;
cursor:pointer;
}

/* Settings Modal */
.settings{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:var(--panel);
padding:20px;
border:1px solid var(--border);
border-radius:8px;
display:none;
flex-direction:column;
gap:10px;
width:280px;
z-index:50;
}

.settings input{
padding:6px;
border-radius:6px;
border:1px solid var(--border);
background:#0b1220;
color:white;
}

/* Mobile */
@media(max-width:768px){
.sidebar{
position:absolute;
height:100%;
z-index:20;
}

.menu-btn{
display:block;
}
}
</style>
</head>

<body>

<button class="menu-btn" onclick="toggleSidebar()">☰</button>

<div id="sidebar" class="sidebar hidden">
<button onclick="createChat()">+ New Chat</button>
<div id="chatList"></div>
<button onclick="openSettings()">Settings</button>
</div>

<div class="main">
<div class="header">ClutchByte AI</div>
<div id="messages" class="messages"></div>

<div class="input-area">
<textarea id="input" rows="1" placeholder="Type message..."></textarea>
<button class="send" onclick="send()">Send</button>
</div>
</div>

<div id="settings" class="settings">
<h3>Settings</h3>
<input id="apiKey" placeholder="OpenRouter API Key">
<input id="model" placeholder="Model">
<button onclick="saveSettings()">Save</button>
<button onclick="closeSettings()">Close</button>
</div>

<script>
let chats = JSON.parse(localStorage.getItem("cb_chats") || "[]");
let current = localStorage.getItem("cb_current");

if(!chats.length){
  const first={id:Date.now(),title:"Chat 1",messages:[]};
  chats.push(first);
  current=first.id;
  saveAll();
}

function saveAll(){
  localStorage.setItem("cb_chats",JSON.stringify(chats));
  localStorage.setItem("cb_current",current);
}

function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("hidden");
}

function createChat(){
  const chat={id:Date.now(),title:"Chat "+(chats.length+1),messages:[]};
  chats.unshift(chat);
  current=chat.id;
  saveAll();
  renderChats();
  renderMessages();
}

function renderChats(){
  const list=document.getElementById("chatList");
  list.innerHTML="";
  chats.forEach(chat=>{
    const div=document.createElement("div");
    div.textContent=chat.title;
    div.style.padding="8px";
    div.style.cursor="pointer";
    div.onclick=()=>{
      current=chat.id;
      saveAll();
      renderMessages();
      toggleSidebar();
    };
    list.appendChild(div);
  });
}

function getCurrent(){
  return chats.find(c=>c.id==current);
}

function renderMessages(){
  const box=document.getElementById("messages");
  box.innerHTML="";
  const chat=getCurrent();
  if(!chat) return;

  chat.messages.forEach(m=>{
    const div=document.createElement("div");
    div.className="message "+m.role;
    div.textContent=m.content;
    box.appendChild(div);
  });

  box.scrollTop=box.scrollHeight;
}

async function send(){
  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  const chat=getCurrent();
  chat.messages.push({role:"user",content:text});
  input.value="";
  renderMessages();
  saveAll();

  const key=localStorage.getItem("cb_apiKey");
  if(!key){
    alert("Add API key in Settings");
    return;
  }

  const aiMsg={role:"ai",content:"Thinking..."};
  chat.messages.push(aiMsg);
  renderMessages();

  try{
    const res=await fetch("https://openrouter.ai/api/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+key
      },
      body:JSON.stringify({
        model: localStorage.getItem("cb_model") || "deepseek/deepseek-r1:free",
        messages: chat.messages.map(m=>({
          role:m.role==="ai"?"assistant":m.role,
          content:m.content
        })),
        stream:false
      })
    });

    const data=await res.json();
    aiMsg.content=data.choices?.[0]?.message?.content || "No response";
    renderMessages();
    saveAll();

  }catch(e){
    aiMsg.content="Connection Error";
    renderMessages();
  }
}

function openSettings(){
  document.getElementById("settings").style.display="flex";
  document.getElementById("apiKey").value=localStorage.getItem("cb_apiKey")||"";
  document.getElementById("model").value=localStorage.getItem("cb_model")||"deepseek/deepseek-r1:free";
}

function closeSettings(){
  document.getElementById("settings").style.display="none";
}

function saveSettings(){
  localStorage.setItem("cb_apiKey",document.getElementById("apiKey").value.trim());
  localStorage.setItem("cb_model",document.getElementById("model").value.trim());
  closeSettings();
}

renderChats();
renderMessages();
</script>

</body>
</html>
