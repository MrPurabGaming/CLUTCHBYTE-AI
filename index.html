<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClutchByte AI</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
}

header{
  background:#1e293b;
  padding:15px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
}

#chat{
  flex:1;
  overflow-y:auto;
  padding:15px;
}

.message{
  margin-bottom:15px;
  max-width:80%;
  padding:10px 14px;
  border-radius:10px;
  word-wrap:break-word;
}

.user{
  background:#2563eb;
  align-self:flex-end;
  margin-left:auto;
}

.bot{
  background:#334155;
}

#inputArea{
  display:flex;
  padding:10px;
  background:#1e293b;
}

#messageInput{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  outline:none;
  font-size:14px;
}

button{
  margin-left:10px;
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
button:disabled{
  opacity:0.6;
}
</style>
</head>

<body>

<header>ClutchByte AI 🚀</header>

<div id="chat"></div>

<div id="inputArea">
  <input type="text" id="messageInput" placeholder="Type your message..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
const backendURL = "https://clutchbyte-ai.onrender.com/chat";

const chat = document.getElementById("chat");
const input = document.getElementById("messageInput");

let conversation = [];

function addMessage(text, type){
  const msg = document.createElement("div");
  msg.classList.add("message", type);
  msg.innerText = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

async function sendMessage(){
  const text = input.value.trim();
  if(!text) return;

  addMessage(text, "user");
  input.value = "";

  conversation.push({ role:"user", content:text });

  const loadingMsg = document.createElement("div");
  loadingMsg.classList.add("message","bot");
  loadingMsg.innerText = "Thinking...";
  chat.appendChild(loadingMsg);
  chat.scrollTop = chat.scrollHeight;

  try{
    const response = await fetch(backendURL,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        model:"openai/gpt-3.5-turbo",
        messages:conversation
      })
    });

    const data = await response.json();

    chat.removeChild(loadingMsg);

    if(data.choices && data.choices.length > 0){
      const reply = data.choices[0].message.content;
      addMessage(reply,"bot");
      conversation.push({ role:"assistant", content:reply });
    } else {
      addMessage("No response from AI.","bot");
    }

  }catch(error){
    chat.removeChild(loadingMsg);
    addMessage("Server error. Check backend or API key.","bot");
    console.error(error);
  }
}
</script>

</body>
</html>
