<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ClutchByte AI</title>

<style>
:root{
--bg:#0f172a;
--panel:#111827;
--border:#1f2937;
--text:#f3f4f6;
--accent:#2563eb;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}

body{
background:var(--bg);
color:var(--text);
display:flex;
height:100vh;
overflow:hidden;
}

.sidebar{
width:250px;
background:#0b1220;
border-right:1px solid var(--border);
display:flex;
flex-direction:column;
padding:15px;
}

.sidebar h2{
margin-bottom:10px;
}

.sidebar button{
background:var(--accent);
border:none;
padding:8px;
margin-bottom:10px;
border-radius:6px;
color:white;
cursor:pointer;
}

.chat-item{
padding:6px;
cursor:pointer;
font-size:14px;
}

.chat-item:hover{
background:rgba(255,255,255,.05);
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.header{
padding:12px;
border-bottom:1px solid var(--border);
display:flex;
justify-content:space-between;
}

.messages{
flex:1;
overflow:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.message{
max-width:80%;
padding:10px;
border-radius:8px;
font-size:14px;
}

.user{
align-self:flex-end;
background:var(--accent);
}

.ai{
align-self:flex-start;
background:var(--panel);
border:1px solid var(--border);
}

.input-area{
display:flex;
padding:10px;
border-top:1px solid var(--border);
}

textarea{
flex:1;
resize:none;
padding:8px;
border-radius:6px;
border:1px solid var(--border);
background:var(--panel);
color:white;
}

.send{
background:var(--accent);
border:none;
padding:8px 14px;
margin-left:8px;
border-radius:6px;
color:white;
cursor:pointer;
}

.settings{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:var(--panel);
padding:20px;
border:1px solid var(--border);
border-radius:8px;
display:none;
flex-direction:column;
gap:10px;
width:300px;
}

.settings input{
padding:6px;
border-radius:6px;
border:1px solid var(--border);
background:#0b1220;
color:white;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>Chats</h2>
<button onclick="newChat()">+ New Chat</button>
<div id="chatList"></div>
<button onclick="openSettings()">Settings</button>
</div>

<div class="main">
<div class="header">
<div>ClutchByte AI</div>
</div>

<div id="messages" class="messages"></div>

<div class="input-area">
<textarea id="input" rows="1" placeholder="Type message..."></textarea>
<button class="send" onclick="send()">Send</button>
</div>
</div>

<div id="settings" class="settings">
<h3>API Settings</h3>
<input id="apiKey" placeholder="OpenRouter API Key">
<input id="model" placeholder="Model" value="deepseek/deepseek-r1:free">
<button onclick="saveSettings()">Save</button>
<button onclick="closeSettings()">Close</button>
</div>

<script>
let chats = JSON.parse(localStorage.getItem("cb_chats") || "[]");
let current = localStorage.getItem("cb_current");

if(chats.length === 0){
  chats.push({id:Date.now(),title:"New Chat",messages:[]});
  current = chats[0].id;
  save();
}

function save(){
  localStorage.setItem("cb_chats",JSON.stringify(chats));
  localStorage.setItem("cb_current",current);
}

function newChat(){
  const chat = {id:Date.now(),title:"New Chat",messages:[]};
  chats.unshift(chat);
  current = chat.id;
  save();
  renderChats();
  render();
}

function renderChats(){
  const list = document.getElementById("chatList");
  list.innerHTML="";
  chats.forEach(c=>{
    const div=document.createElement("div");
    div.className="chat-item";
    div.innerText=c.title;
    div.onclick=()=>{
      current=c.id;
      save();
      render();
    };
    list.appendChild(div);
  });
}

function getCurrent(){
  return chats.find(c=>c.id==current);
}

function render(){
  const chat=getCurrent();
  const box=document.getElementById("messages");
  box.innerHTML="";
  chat.messages.forEach(m=>{
    const div=document.createElement("div");
    div.className="message "+m.role;
    div.innerText=m.content;
    box.appendChild(div);
  });
  box.scrollTop=box.scrollHeight;
}

async function send(){
  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  const chat=getCurrent();
  chat.messages.push({role:"user",content:text});
  input.value="";
  render();
  save();

  const key=localStorage.getItem("cb_apiKey");
  if(!key){
    alert("Add API key in settings");
    return;
  }

  const ai={role:"ai",content:"Thinking..."};
  chat.messages.push(ai);
  render();

  try{
    const res=await fetch("https://openrouter.ai/api/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+key
      },
      body:JSON.stringify({
        model: localStorage.getItem("cb_model") || "deepseek/deepseek-r1:free",
        messages: chat.messages.map(m=>({
          role: m.role==="ai" ? "assistant" : m.role,
          content: m.content
        })),
        stream:false
      })
    });

    const data=await res.json();
    ai.content=data.choices?.[0]?.message?.content || "No response";
    render();
    save();

  }catch(e){
    ai.content="Error connecting to AI";
    render();
  }
}

function openSettings(){
  document.getElementById("settings").style.display="flex";
}

function closeSettings(){
  document.getElementById("settings").style.display="none";
}

function saveSettings(){
  localStorage.setItem("cb_apiKey",document.getElementById("apiKey").value);
  localStorage.setItem("cb_model",document.getElementById("model").value);
  closeSettings();
}

renderChats();
render();
</script>

</body>
</html>
