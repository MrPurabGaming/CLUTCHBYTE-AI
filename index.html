<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClutchByte AI</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
}

/* HEADER */
.header{
position:fixed;
top:0;
left:0;
right:0;
height:50px;
background:#111827;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
z-index:10;
}

.settings-btn{
position:absolute;
right:10px;
top:10px;
background:#2563eb;
border:none;
color:white;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

/* MESSAGES */
.messages{
position:fixed;
top:50px;
bottom:60px;
left:0;
right:0;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:10px;
}

.message{
padding:10px;
border-radius:8px;
max-width:80%;
font-size:14px;
white-space:pre-wrap;
}

.user{
align-self:flex-end;
background:#2563eb;
}

.ai{
align-self:flex-start;
background:#1f2937;
}

/* INPUT BAR */
.input-area{
position:fixed;
bottom:0;
left:0;
right:0;
height:60px;
background:#111827;
display:flex;
padding:10px;
box-sizing:border-box;
}

textarea{
flex:1;
resize:none;
border:none;
border-radius:6px;
padding:8px;
background:#1f2937;
color:white;
font-size:14px;
}

.send-btn{
margin-left:8px;
border:none;
border-radius:6px;
padding:8px 14px;
background:#2563eb;
color:white;
cursor:pointer;
}

/* MODAL */
.modal{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#1f2937;
padding:20px;
border-radius:8px;
display:none;
flex-direction:column;
gap:10px;
z-index:20;
width:280px;
}

.modal input{
padding:8px;
border-radius:6px;
border:none;
background:#111827;
color:white;
font-size:14px;
}

.modal button{
padding:8px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
}
</style>
</head>
<body>

<div class="header">
ClutchByte AI
<button class="settings-btn" onclick="openSettings()">Settings</button>
</div>

<div id="messages" class="messages"></div>

<div class="input-area">
<textarea id="input" rows="1" placeholder="Type message..."></textarea>
<button class="send-btn" onclick="send()">Send</button>
</div>

<div id="modal" class="modal">
<h3>API Settings</h3>
<input id="apiKey" placeholder="Enter OpenRouter API Key">
<input id="model" placeholder="Model name (optional)">
<button onclick="saveSettings()">Save</button>
<button onclick="closeSettings()">Close</button>
</div>

<script>
let messages = JSON.parse(localStorage.getItem("cb_msgs") || "[]");

function saveMessages(){
localStorage.setItem("cb_msgs", JSON.stringify(messages));
}

function render(){
const box=document.getElementById("messages");
box.innerHTML="";
messages.forEach(m=>{
const div=document.createElement("div");
div.className="message "+m.role;
div.textContent=m.content;
box.appendChild(div);
});
box.scrollTop=box.scrollHeight;
}

async function send(){
const input=document.getElementById("input");
const text=input.value.trim();
if(!text) return;

messages.push({role:"user",content:text});
input.value="";
render();
saveMessages();

const key=localStorage.getItem("cb_apiKey");
if(!key){
alert("Please add API key in Settings");
return;
}

const aiMsg={role:"ai",content:"Thinking..."};
messages.push(aiMsg);
render();

try{
const res=await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+key
},
body:JSON.stringify({
model:localStorage.getItem("cb_model")||"deepseek/deepseek-r1:free",
messages:messages.map(m=>({
role:m.role==="ai"?"assistant":m.role,
content:m.content
})),
stream:false
})
});

const data=await res.json();
aiMsg.content=data.choices?.[0]?.message?.content||"No response";
render();
saveMessages();

}catch(e){
aiMsg.content="Connection error (Maybe CORS)";
render();
}
}

function openSettings(){
document.getElementById("modal").style.display="flex";
document.getElementById("apiKey").value=localStorage.getItem("cb_apiKey")||"";
document.getElementById("model").value=localStorage.getItem("cb_model")||"deepseek/deepseek-r1:free";
}

function closeSettings(){
document.getElementById("modal").style.display="none";
}

function saveSettings(){
localStorage.setItem("cb_apiKey",document.getElementById("apiKey").value.trim());
localStorage.setItem("cb_model",document.getElementById("model").value.trim());
closeSettings();
}

render();
</script>

</body>
</html>
