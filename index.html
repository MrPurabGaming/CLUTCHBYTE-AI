<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClutchByte AI - Enterprise</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography,forms"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        .glass { background: rgba(32, 33, 35, 0.9); backdrop-filter: blur(12px); }
        .sidebar-scroll::-webkit-scrollbar { width: 4px; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: #444654; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#343541] text-white overflow-hidden h-screen font-sans">

    <div id="auth-screen" class="fixed inset-0 z-[100] bg-[#202123] flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-[#343541] p-8 rounded-2xl border border-gray-700 shadow-2xl">
            <h2 id="auth-title" class="text-2xl font-bold text-center mb-6">ClutchByte AI</h2>
            <div class="space-y-4">
                <input type="email" id="auth-email" placeholder="Email Address" class="w-full bg-[#40414F] border border-gray-600 p-3 rounded-lg focus:ring-2 focus:ring-green-500 outline-none">
                <input type="password" id="auth-pass" placeholder="Password" class="w-full bg-[#40414F] border border-gray-600 p-3 rounded-lg focus:ring-2 focus:ring-green-500 outline-none">
                <button onclick="handleAuth()" id="auth-btn" class="w-full bg-green-600 hover:bg-green-700 p-3 rounded-lg font-bold transition-all">Log In</button>
                <p class="text-sm text-center text-gray-400">
                    <span id="auth-toggle-text">New here?</span> 
                    <button onclick="toggleAuthMode()" class="text-green-500 hover:underline">Create Account</button>
                </p>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden flex h-full">
        <aside class="w-[260px] bg-[#202123] flex flex-col border-r border-white/10">
            <div class="p-4">
                <button onclick="location.reload()" class="w-full border border-white/20 p-3 rounded-md hover:bg-gray-800 text-sm flex items-center gap-3">
                    <span>+</span> New Chat
                </button>
            </div>
            <div id="chat-list" class="flex-1 overflow-y-auto sidebar-scroll p-2"></div>
            
            <div class="p-2 border-t border-white/10 space-y-1">
                <div id="admin-btn-container"></div>
                <button onclick="auth.signOut()" class="w-full p-3 hover:bg-red-900/20 text-red-400 rounded-md text-sm text-left">Logout</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative">
            <header class="h-14 border-b border-white/10 flex items-center px-4 justify-between bg-[#343541]">
                <div class="flex items-center gap-4">
                    <span class="text-xs font-bold text-gray-400">MODEL</span>
                    <select id="model-select" class="bg-transparent border-none text-sm font-bold focus:ring-0 cursor-pointer">
                        <option value="groq:llama-3.3-70b">Llama 3.3 70B</option>
                        <option value="google:gemini-1.5-flash">Gemini Flash</option>
                    </select>
                </div>
                <div id="user-credits" class="text-xs bg-gray-800 px-3 py-1 rounded-full text-green-400 font-mono">Tokens: 0</div>
            </header>

            <div id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-6 pb-32">
                <div class="h-full flex flex-col items-center justify-center opacity-20">
                    <h1 class="text-4xl font-bold">ClutchByte AI</h1>
                </div>
            </div>

            <div class="absolute bottom-0 w-full p-4 bg-gradient-to-t from-[#343541]">
                <div class="max-w-3xl mx-auto flex items-end bg-[#40414F] rounded-xl border border-white/10 p-2">
                    <textarea id="user-input" rows="1" class="flex-1 bg-transparent border-none focus:ring-0 text-white p-2 resize-none" placeholder="Ask anything..."></textarea>
                    <button id="send-btn" class="p-2 text-green-500 hover:text-white transition-colors">➤</button>
                </div>
            </div>
        </main>
    </div>

    <div id="admin-panel" class="hidden fixed inset-0 z-[110] glass flex items-center justify-center p-4">
        <div class="w-full max-w-4xl bg-[#202123] rounded-2xl border border-gray-700 h-[80vh] flex flex-col shadow-2xl">
            <div class="p-6 border-b border-gray-700 flex justify-between items-center">
                <h2 class="text-xl font-bold">Admin Management</h2>
                <button onclick="closeAdmin()" class="text-gray-400 hover:text-white text-3xl">&times;</button>
            </div>
            <div class="flex-1 overflow-y-auto p-6">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-gray-400 text-xs uppercase border-b border-gray-800">
                            <th class="p-3">User</th>
                            <th class="p-3">Role</th>
                            <th class="p-3">Tokens</th>
                            <th class="p-3">Manage</th>
                        </tr>
                    </thead>
                    <tbody id="admin-user-table"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Paste your exact config here
        const firebaseConfig = {
            apiKey: "AIzaSyAOMe1cI94JC-R9MA8PXsQBT7hEJ7NZJpE",
            authDomain: "clutchbyte-ai.firebaseapp.com",
            projectId: "clutchbyte-ai",
            storageBucket: "clutchbyte-ai.firebasestorage.app",
            messagingSenderId: "75426564085",
            appId: "1:75426564085:web:d607240f2e0dedb24302bc"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let isLoginMode = true;

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "ClutchByte AI" : "Create Account";
            document.getElementById('auth-btn').innerText = isLoginMode ? "Log In" : "Register";
        }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            try {
                if (isLoginMode) {
                    await auth.signInWithEmailAndPassword(email, pass);
                } else {
                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                    await db.collection('users').doc(res.user.uid).set({
                        email: email,
                        role: 'user',
                        tokens: 1000,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
            } catch (err) { alert(err.message); }
        }

        auth.onAuthStateChanged(async user => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                
                // Real-time listener for user data (credits/role)
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        document.getElementById('user-credits').innerText = `Tokens: ${data.tokens.toLocaleString()}`;
                        if (data.role === 'admin') {
                            document.getElementById('admin-btn-container').innerHTML = `
                                <button onclick="openAdmin()" class="w-full p-3 bg-green-900/20 text-green-400 rounded-md text-sm text-left font-bold mb-2 border border-green-900/50">🛡️ Admin Panel</button>
                            `;
                        }
                    }
                });
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        async function openAdmin() {
            document.getElementById('admin-panel').classList.remove('hidden');
            const snap = await db.collection('users').get();
            const table = document.getElementById('admin-user-table');
            table.innerHTML = "";
            snap.forEach(doc => {
                const u = doc.data();
                table.innerHTML += `
                    <tr class="border-b border-gray-800 text-sm">
                        <td class="p-3">${u.email}</td>
                        <td class="p-3"><span class="px-2 py-0.5 rounded bg-gray-700">${u.role}</span></td>
                        <td class="p-3 font-mono text-green-400">${u.tokens}</td>
                        <td class="p-3 space-x-2">
                            <button onclick="addTokens('${doc.id}', 5000)" class="bg-green-600 hover:bg-green-700 px-3 py-1 rounded text-xs text-white">+5k Tokens</button>
                            <button onclick="makeAdmin('${doc.id}')" class="bg-blue-600 hover:bg-blue-700 px-3 py-1 rounded text-xs text-white">Make Admin</button>
                        </td>
                    </tr>
                `;
            });
        }

        async function addTokens(id, amt) {
            await db.collection('users').doc(id).update({ tokens: firebase.firestore.FieldValue.increment(amt) });
            openAdmin();
        }

        async function makeAdmin(id) {
            if(confirm("Promote this user to Admin?")) {
                await db.collection('users').doc(id).update({ role: 'admin' });
                openAdmin();
            }
        }

        function closeAdmin() { document.getElementById('admin-panel').classList.add('hidden'); }
    </script>
</body>
</html>
