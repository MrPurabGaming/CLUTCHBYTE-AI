<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClutchByte AI Enterprise</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

header {
    padding: 15px;
    background: #111827;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

#chat {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

.message {
    margin-bottom: 15px;
    padding: 10px 15px;
    border-radius: 8px;
    max-width: 80%;
}

.user {
    background: #2563eb;
    align-self: flex-end;
}

.bot {
    background: #1f2937;
    align-self: flex-start;
}

#input-area {
    display: flex;
    padding: 10px;
    background: #111827;
}

input {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 6px;
    outline: none;
}

button {
    padding: 12px 18px;
    margin-left: 10px;
    border: none;
    border-radius: 6px;
    background: #2563eb;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}
</style>
</head>

<body>

<header>🚀 ClutchByte AI Enterprise</header>

<div id="chat"></div>

<div id="input-area">
    <input type="text" id="messageInput" placeholder="Type your message...">
    <button onclick="sendMessage()">Send</button>
</div>

<script>

const API_URL = "https://clutchbyte-ai.onrender.com/api/chat";

async function sendMessage() {
    const input = document.getElementById("messageInput");
    const message = input.value.trim();
    if (!message) return;

    addMessage("user", message);
    input.value = "";

    try {
        const response = await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message })
        });

        const data = await response.json();

        addMessage("bot", data.reply || "No response from server");
    } catch (error) {
        addMessage("bot", "❌ Server Error");
    }
}

function addMessage(type, text) {
    const chat = document.getElementById("chat");
    const msg = document.createElement("div");
    msg.classList.add("message", type);
    msg.innerText = text;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
