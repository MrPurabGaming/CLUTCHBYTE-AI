<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClutchByte AI</title>

<style>
:root{
--bg:#0f172a;
--panel:#111827;
--border:#1f2937;
--text:#f3f4f6;
--accent:#2563eb;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}

body{
background:var(--bg);
color:var(--text);
display:flex;
height:100vh;
overflow:hidden;
}

.sidebar{
width:230px;
background:#0b1220;
border-right:1px solid var(--border);
display:flex;
flex-direction:column;
padding:12px;
overflow:auto;
}

.sidebar button{
background:var(--accent);
border:none;
padding:8px;
margin-bottom:10px;
border-radius:6px;
color:white;
cursor:pointer;
}

.chat-item{
padding:8px;
cursor:pointer;
border-radius:6px;
font-size:14px;
}

.chat-item:hover{
background:rgba(255,255,255,.08);
}

.active{
background:rgba(37,99,235,.3);
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.header{
padding:12px;
border-bottom:1px solid var(--border);
font-weight:bold;
}

.messages{
flex:1;
overflow:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.message{
max-width:85%;
padding:10px;
border-radius:8px;
font-size:14px;
white-space:pre-wrap;
}

.user{
align-self:flex-end;
background:var(--accent);
}

.ai{
align-self:flex-start;
background:var(--panel);
border:1px solid var(--border);
}

.input-area{
display:flex;
padding:10px;
border-top:1px solid var(--border);
}

textarea{
flex:1;
resize:none;
padding:8px;
border-radius:6px;
border:1px solid var(--border);
background:var(--panel);
color:white;
}

.send{
background:var(--accent);
border:none;
padding:8px 14px;
margin-left:8px;
border-radius:6px;
color:white;
cursor:pointer;
}

.settings{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:var(--panel);
padding:20px;
border:1px solid var(--border);
border-radius:8px;
display:none;
flex-direction:column;
gap:10px;
width:300px;
z-index:10;
}

.settings input{
padding:6px;
border-radius:6px;
border:1px solid var(--border);
background:#0b1220;
color:white;
}
</style>
</head>

<body>

<div class="sidebar">
<button onclick="createChat()">+ New Chat</button>
<div id="chatList"></div>
<button onclick="openSettings()">Settings</button>
</div>

<div class="main">
<div class="header">ClutchByte AI</div>
<div id="messages" class="messages"></div>

<div class="input-area">
<textarea id="input" rows="1" placeholder="Type message..."></textarea>
<button class="send" onclick="send()">Send</button>
</div>
</div>

<div id="settings" class="settings">
<h3>Settings</h3>
<input id="apiKey" placeholder="OpenRouter API Key">
<input id="model" placeholder="Model Name">
<button onclick="saveSettings()">Save</button>
<button onclick="closeSettings()">Close</button>
</div>

<script>
let chats = JSON.parse(localStorage.getItem("cb_chats") || "[]");
let current = localStorage.getItem("cb_current");

if(!chats.length){
  const first = {id: Date.now(), title:"Chat 1", messages:[]};
  chats.push(first);
  current = first.id;
  saveAll();
}

if(!current){
  current = chats[0].id;
  saveAll();
}

function saveAll(){
  localStorage.setItem("cb_chats", JSON.stringify(chats));
  localStorage.setItem("cb_current", current);
}

function createChat(){
  const newChat = {
    id: Date.now(),
    title: "Chat " + (chats.length+1),
    messages:[]
  };
  chats.unshift(newChat);
  current = newChat.id;
  saveAll();
  renderChats();
  renderMessages();
}

function renderChats(){
  const list = document.getElementById("chatList");
  list.innerHTML="";
  chats.forEach(chat=>{
    const div=document.createElement("div");
    div.className="chat-item"+(chat.id==current?" active":"");
    div.textContent=chat.title;
    div.onclick=()=>{
      current=chat.id;
      saveAll();
      renderChats();
      renderMessages();
    };
    list.appendChild(div);
  });
}

function getCurrent(){
  return chats.find(c=>c.id==current);
}

function renderMessages(){
  const box=document.getElementById("messages");
  box.innerHTML="";
  const chat=getCurrent();
  if(!chat) return;

  chat.messages.forEach(msg=>{
    const div=document.createElement("div");
    div.className="message "+msg.role;
    div.textContent=msg.content;
    box.appendChild(div);
  });
  box.scrollTop=box.scrollHeight;
}

async function send(){
  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  const chat=getCurrent();
  chat.messages.push({role:"user",content:text});
  input.value="";
  renderMessages();
  saveAll();

  const key=localStorage.getItem("cb_apiKey");
  if(!key){
    alert("Add API key in settings");
    return;
  }

  const aiMsg={role:"ai",content:"Thinking..."};
  chat.messages.push(aiMsg);
  renderMessages();

  try{
    const res=await fetch("https://openrouter.ai/api/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+key
      },
      body:JSON.stringify({
        model: localStorage.getItem("cb_model") || "deepseek/deepseek-r1:free",
        messages: chat.messages.map(m=>({
          role: m.role==="ai"?"assistant":m.role,
          content: m.content
        })),
        stream:false
      })
    });

    const data=await res.json();
    aiMsg.content=data.choices?.[0]?.message?.content || "No response";
    renderMessages();
    saveAll();

  }catch(err){
    aiMsg.content="Error connecting to AI";
    renderMessages();
  }
}

function openSettings(){
  document.getElementById("settings").style.display="flex";
  document.getElementById("apiKey").value=localStorage.getItem("cb_apiKey")||"";
  document.getElementById("model").value=localStorage.getItem("cb_model")||"deepseek/deepseek-r1:free";
}

function closeSettings(){
  document.getElementById("settings").style.display="none";
}

function saveSettings(){
  localStorage.setItem("cb_apiKey", document.getElementById("apiKey").value.trim());
  localStorage.setItem("cb_model", document.getElementById("model").value.trim());
  closeSettings();
}

renderChats();
renderMessages();
</script>

</body>
</html>
