<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Universal AI</title>

<!-- ✅ Stable Tailwind CSS (NO JS CDN) -->
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet">

<!-- Marked.js -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
html, body { height:100%; }
.dark { background-color:#18181b; }
.dark .dark\:bg-zinc-800 { background-color:#27272a; }
.dark .dark\:bg-zinc-700 { background-color:#3f3f46; }
.dark .dark\:border-zinc-700 { border-color:#3f3f46; }
.dark .dark\:text-black { color:black; }
.dark .dark\:bg-white { background:white; }
</style>
</head>

<body class="bg-gray-100 transition-colors duration-300">

<div id="loading" class="flex items-center justify-center min-h-screen text-lg font-semibold">
Loading App...
</div>

<div id="app" class="hidden min-h-screen flex">

<!-- Sidebar -->
<aside id="sidebar"
class="fixed md:relative z-40 w-72 bg-white border-r border-gray-200
flex flex-col transform -translate-x-full md:translate-x-0 transition-transform duration-300">

<div class="p-4 border-b flex justify-between items-center">
<h2 class="font-bold">Chats</h2>
<button id="closeSidebar" class="md:hidden text-xl">✕</button>
</div>

<button id="newChatBtn"
class="m-4 bg-black text-white py-2 rounded-lg">
+ New Chat
</button>

<div id="chatList" class="flex-1 overflow-y-auto px-2 space-y-1"></div>

<div class="p-4 border-t space-y-2">
<button id="settingsBtn" class="w-full text-left">⚙ Settings</button>
<button id="systemPromptBtn" class="w-full text-left">🧠 System Prompt</button>
<button id="darkToggle" class="w-full text-left">🌙 Toggle Dark Mode</button>
</div>
</aside>

<!-- Main -->
<div class="flex-1 flex flex-col w-full">

<header class="flex items-center justify-between p-4 border-b bg-white">
<button id="openSidebar" class="md:hidden text-xl">☰</button>
<h1 class="font-semibold">Universal AI</h1>
<div></div>
</header>

<main id="messages" class="flex-1 overflow-y-auto p-4 space-y-4"></main>

<div class="sticky bottom-0 bg-white border-t p-3">
<div class="flex gap-2">
<textarea id="messageInput" rows="1"
placeholder="Message AI..."
class="flex-1 resize-none rounded-lg border p-2"></textarea>
<button id="sendBtn"
class="bg-black text-white px-4 rounded-lg">
Send
</button>
</div>
</div>

</div>
</div>

<!-- Settings Modal -->
<div id="settingsModal"
class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4">
<div class="bg-white p-6 rounded-xl w-full max-w-md space-y-4">
<h2 class="text-lg font-bold">Settings</h2>

<input id="apiKeyInput" type="password"
placeholder="OpenRouter API Key"
class="w-full border p-2 rounded">

<input id="modelInput" type="text"
value="deepseek/deepseek-r1:free"
class="w-full border p-2 rounded">

<div class="flex justify-end gap-2">
<button id="closeSettings">Cancel</button>
<button id="saveSettings"
class="bg-black text-white px-4 py-2 rounded">
Save
</button>
</div>
</div>
</div>

<!-- System Prompt Modal -->
<div id="systemModal"
class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4">
<div class="bg-white p-6 rounded-xl w-full max-w-md space-y-4">
<h2 class="text-lg font-bold">System Prompt</h2>

<textarea id="systemPromptInput"
rows="5"
class="w-full border p-2 rounded"></textarea>

<div class="flex justify-end gap-2">
<button id="closeSystem">Cancel</button>
<button id="saveSystem"
class="bg-black text-white px-4 py-2 rounded">
Save
</button>
</div>
</div>
</div>

<script>
(function(){

const app = document.getElementById("app");
const loading = document.getElementById("loading");
const messagesEl = document.getElementById("messages");
const input = document.getElementById("messageInput");

let chats = JSON.parse(localStorage.getItem("chats")||"[]");
let currentChatId = localStorage.getItem("currentChatId");

if(!chats.length) createChat();

function save(){localStorage.setItem("chats",JSON.stringify(chats));}

function createChat(){
const chat={id:Date.now(),title:"New Chat",messages:[],system:""};
chats.unshift(chat);
currentChatId=chat.id;
save();
renderChats();
renderMessages();
}

function current(){return chats.find(c=>c.id==currentChatId);}

function renderChats(){
const list=document.getElementById("chatList");
list.innerHTML="";
chats.forEach(chat=>{
const div=document.createElement("div");
div.className="p-2 rounded cursor-pointer hover:bg-gray-200";
div.innerHTML=`<div class="flex justify-between items-center">
<span>${chat.title}</span>
<button onclick="deleteChat(${chat.id})">🗑</button>
</div>`;
div.onclick=()=>{
currentChatId=chat.id;
localStorage.setItem("currentChatId",chat.id);
renderMessages();
};
list.appendChild(div);
});
}

window.deleteChat=function(id){
chats=chats.filter(c=>c.id!=id);
currentChatId=chats[0]?.id;
save();
renderChats();
renderMessages();
}

function renderMessages(){
const chat=current();
messagesEl.innerHTML="";
if(!chat)return;

chat.messages.forEach(m=>{
const wrap=document.createElement("div");
wrap.className=m.role==="user"?"text-right":"text-left";

const bubble=document.createElement("div");
bubble.className="inline-block max-w-xl p-3 rounded-xl "+
(m.role==="user"?"bg-black text-white":"bg-gray-200");

bubble.innerHTML=marked.parse(m.content);
wrap.appendChild(bubble);
messagesEl.appendChild(wrap);
});
messagesEl.scrollTop=messagesEl.scrollHeight;
}

async function send(){
const text=input.value.trim();
if(!text)return;

const chat=current();
chat.messages.push({role:"user",content:text});
input.value="";
renderMessages();
save();

const key=localStorage.getItem("apiKey");
if(!key){alert("Set API key");return;}

const ai={role:"assistant",content:""};
chat.messages.push(ai);
renderMessages();

const response=await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+key
},
body:JSON.stringify({
model:localStorage.getItem("model")||"deepseek/deepseek-r1:free",
stream:true,
messages:chat.messages
})
});

const reader=response.body.getReader();
const decoder=new TextDecoder();

while(true){
const {value,done}=await reader.read();
if(done)break;
const chunk=decoder.decode(value);
chunk.split("\n").forEach(line=>{
if(line.startsWith("data: ")){
const data=line.replace("data: ","");
if(data==="[DONE]")return;
try{
const json=JSON.parse(data);
const token=json.choices?.[0]?.delta?.content;
if(token){
ai.content+=token;
renderMessages();
save();
}
}catch{}
}
});
}
}

document.getElementById("sendBtn").onclick=send;
input.addEventListener("keydown",e=>{
if(e.key==="Enter"&&!e.shiftKey){
e.preventDefault();send();
}
});

document.getElementById("newChatBtn").onclick=createChat;

document.getElementById("settingsBtn").onclick=
()=>document.getElementById("settingsModal").classList.remove("hidden");

document.getElementById("closeSettings").onclick=
()=>document.getElementById("settingsModal").classList.add("hidden");

document.getElementById("saveSettings").onclick=()=>{
localStorage.setItem("apiKey",document.getElementById("apiKeyInput").value);
localStorage.setItem("model",document.getElementById("modelInput").value);
document.getElementById("settingsModal").classList.add("hidden");
};

document.getElementById("darkToggle").onclick=()=>{
document.body.classList.toggle("dark");
localStorage.setItem("dark",document.body.classList.contains("dark"));
};

if(localStorage.getItem("dark")==="true")
document.body.classList.add("dark");

document.getElementById("openSidebar").onclick=
()=>document.getElementById("sidebar").classList.remove("-translate-x-full");

document.getElementById("closeSidebar").onclick=
()=>document.getElementById("sidebar").classList.add("-translate-x-full");

renderChats();
renderMessages();

loading.style.display="none";
app.classList.remove("hidden");

})();
</script>

</body>
</html>
