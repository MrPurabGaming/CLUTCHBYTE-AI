<!DOCTYPE html>
<html>
<head>
<title>ClutchByte AI</title>
<style>
body {
  background: #111827;
  color: white;
  font-family: Arial;
  margin: 0;
}
#chat {
  height: 80vh;
  overflow-y: auto;
  padding: 20px;
}
.message {
  margin-bottom: 10px;
}
input {
  width: 80%;
  padding: 10px;
}
button {
  padding: 10px;
}
</style>
</head>
<body>

<h2 style="text-align:center;">🚀 ClutchByte AI</h2>

<div id="chat"></div>

<div style="padding:20px;">
  <input id="msg" placeholder="Type message..." />
  <button onclick="send()">Send</button>
</div>

<script>
async function send() {
  const input = document.getElementById("msg");
  const text = input.value;
  if (!text) return;

  add("You: " + text);
  input.value = "";

  const res = await fetch("https://clutchbyte-ai.onrender.com/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();
  add("Bot: " + data.reply);
}

function add(text) {
  const div = document.createElement("div");
  div.className = "message";
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
}
</script>

</body>
</html>
