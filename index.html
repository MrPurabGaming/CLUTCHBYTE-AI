<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClutchByte AI Ultra PRO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial}

body{
background:radial-gradient(circle at top,#0f0f1a,#050509 70%);
color:#e5e7eb;
height:100vh;
display:flex;
overflow:hidden;
}

/* Sidebar */
.sidebar{
width:250px;
background:rgba(20,20,35,0.6);
backdrop-filter:blur(20px);
border-right:1px solid rgba(255,255,255,0.05);
padding:20px;
display:flex;
flex-direction:column;
transition:.3s;
}

.sidebar h2{
color:#00f5ff;
margin-bottom:25px;
}

.sidebar button{
background:rgba(255,255,255,0.05);
border:none;
padding:12px;
margin-bottom:10px;
border-radius:10px;
color:#ccc;
cursor:pointer;
transition:.3s;
}

.sidebar button:hover{
background:#00f5ff;
color:black;
}

/* Main */
.main{
flex:1;
display:flex;
flex-direction:column;
}

/* Header */
.header{
background:rgba(15,15,30,0.6);
backdrop-filter:blur(15px);
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.header span{
font-weight:bold;
color:#00f5ff;
}

.header button{
background:none;
border:none;
color:#00f5ff;
font-size:20px;
cursor:pointer;
}

/* Chat */
.chat{
flex:1;
overflow-y:auto;
padding:30px;
display:flex;
flex-direction:column;
}

.message{
max-width:75%;
padding:15px 18px;
margin-bottom:18px;
border-radius:18px;
font-size:15px;
line-height:1.6;
position:relative;
animation:fadeIn .3s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

.user{
align-self:flex-end;
background:linear-gradient(135deg,#0066ff,#00f5ff);
color:black;
box-shadow:0 0 15px #00f5ff88;
}

.bot{
align-self:flex-start;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.05);
}

/* Copy button */
.copy-btn{
position:absolute;
top:8px;
right:10px;
font-size:12px;
cursor:pointer;
color:#00f5ff;
}

/* Code block */
pre{
background:#0f172a;
padding:12px;
border-radius:10px;
overflow-x:auto;
margin-top:10px;
color:#00f5ff;
}

/* Typing dots */
.typing{
display:inline-block;
}
.typing span{
display:inline-block;
width:6px;
height:6px;
background:#00f5ff;
border-radius:50%;
margin:0 2px;
animation:bounce 1.4s infinite both;
}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}

@keyframes bounce{
0%,80%,100%{transform:scale(0)}
40%{transform:scale(1)}
}

/* Input */
.input-area{
display:flex;
padding:20px;
background:rgba(15,15,30,0.7);
backdrop-filter:blur(15px);
}

.input-area input{
flex:1;
padding:14px;
border-radius:30px;
border:none;
outline:none;
background:rgba(255,255,255,0.07);
color:white;
font-size:14px;
}

.input-area button{
margin-left:10px;
padding:14px 22px;
border-radius:30px;
border:none;
background:#00f5ff;
color:black;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 15px #00f5ff88;
}

@media(max-width:768px){
.sidebar{
position:absolute;
left:-250px;
height:100%;
z-index:10;
}
.sidebar.active{left:0;}
}
</style>
</head>

<body>

<div class="sidebar" id="sidebar">
<h2>CLUTCHBYTE</h2>
<button onclick="newChat()">➕ New Chat</button>
<button onclick="clearChat()">🗑 Clear Chat</button>
</div>

<div class="main">

<div class="header">
<span>Ultra AI PRO</span>
<button onclick="toggleSidebar()">☰</button>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
<input type="text" id="messageInput" placeholder="Ask anything..." onkeydown="if(event.key==='Enter')sendMessage()">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>
const backendURL="https://clutchbyte-ai.onrender.com/chat";
let conversation=[];
const chat=document.getElementById("chat");
const input=document.getElementById("messageInput");

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("active");
}

function newChat(){conversation=[];chat.innerHTML="";}
function clearChat(){chat.innerHTML="";}

function addMessage(content,type,isHTML=false){
const msg=document.createElement("div");
msg.classList.add("message",type);

if(isHTML){
msg.innerHTML=content;
}else{
msg.innerText=content;
}

if(type==="bot"){
const copy=document.createElement("span");
copy.classList.add("copy-btn");
copy.innerText="Copy";
copy.onclick=()=>navigator.clipboard.writeText(msg.innerText);
msg.appendChild(copy);
}

chat.appendChild(msg);
chat.scrollTop=chat.scrollHeight;
}

function showTyping(){
const typing=document.createElement("div");
typing.classList.add("message","bot");
typing.id="typing";
typing.innerHTML=`<div class="typing"><span></span><span></span><span></span></div>`;
chat.appendChild(typing);
chat.scrollTop=chat.scrollHeight;
}

function removeTyping(){
const t=document.getElementById("typing");
if(t)chat.removeChild(t);
}

function formatMarkdown(text){
return text
.replace(/```([\s\S]*?)```/g,'<pre>$1</pre>')
.replace(/\*\*(.*?)\*\*/g,'<b>$1</b>')
.replace(/\n/g,'<br>');
}

async function sendMessage(){
const text=input.value.trim();
if(!text)return;

addMessage(text,"user");
conversation.push({role:"user",content:text});
input.value="";

showTyping();

try{
const response=await fetch(backendURL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({messages:conversation})
});

const data=await response.json();
removeTyping();

if(data.choices && data.choices.length>0){
const reply=data.choices[0].message.content;
conversation.push({role:"assistant",content:reply});
addMessage(formatMarkdown(reply),"bot",true);
}else{
addMessage("No response from AI.","bot");
}
}catch(e){
removeTyping();
addMessage("Server error.","bot");
}
}
</script>

</body>
</html>
